[profile.default]
src = "src"
out = "out"
libs = ["lib"]
fs_permissions = [{ access = "read", path = "broadcast" }, { access = "read", path = "map" }]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

[rpc_endpoints]
celo = "${CELO_RPC_URL}"
celo_testnet = "${CELO_TESTNET_RPC_URL}"
